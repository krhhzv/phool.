<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>phool.</title>

<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Shadows+Into+Light&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  background:#f6f1e8;
  font-family:'Patrick Hand', cursive;
}

.container{
  max-width:520px;
  margin:auto;
  padding:20px;
}

/* logo */
.logo{
  font-size:34px;
  transform:rotate(-3deg);
  position:relative;
}
.logo::after{
  content:"✿";
  position:absolute;
  right:-20px;
  top:-10px;
}

/* inputs */
.input{
  width:100%;
  border:none;
  border-bottom:2px dashed #cfc7bd;
  margin:14px 0;
  padding:10px;
  font-size:16px;
  background:none;
}

textarea{height:120px;}

/* gifts */
.gifts{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
}

.gift{
  padding:8px 14px;
  border:2px solid #000;
  background:#fff;
  cursor:pointer;
  box-shadow:2px 2px 0 #000;
}
.gift.active{background:#ffd1d9}

/* button */
button{
  width:100%;
  margin-top:12px;
  padding:14px;
  border:2px solid #000;
  background:#fff;
  font-size:16px;
  box-shadow:3px 3px 0 #000;
  cursor:pointer;
}

.output{
  margin-top:12px;
  font-size:13px;
}

.output a{
  display:block;
  margin-bottom:8px;
  text-decoration:underline;
  color:#000;
}

.credit{
  margin-top:25px;
  text-align:center;
  font-size:11px;
  color:#777;
}
</style>
</head>

<body>

<div class="container">

  <div class="logo">phool.</div>

  <input id="to" class="input" placeholder="to:">
  <input id="from" class="input" placeholder="from:">
  <textarea id="msg" class="input" placeholder="write whatever..."></textarea>

  <div class="gifts">
    <div class="gift" onclick="toggle(this,'🌸')">🌸</div>
    <div class="gift" onclick="toggle(this,'♡')">♡</div>
    <div class="gift" onclick="toggle(this,'...')">...</div>
    <div class="gift" onclick="toggle(this,'★')">★</div>
    <div class="gift" onclick="toggle(this,'!!')">!!</div>
  </div>

  <button onclick="gen()">make it</button>

  <div id="out" class="output"></div>

  <div class="credit">built by someone for his someone.</div>

</div>

<script>
let gifts=[];

function toggle(el,g){
  if(gifts.includes(g)){
    gifts=gifts.filter(x=>x!==g);
    el.classList.remove("active");
  }else{
    gifts.push(g);
    el.classList.add("active");
  }
}

function gen(){
  const data={
    to:to.value,
    from:from.value,
    msg:msg.value,
    gifts:gifts
  };

  const encoded=btoa(JSON.stringify(data));

  let base=window.location.href;

  if(base.includes("index.html")){
    base=base.replace("index.html","");
  }

  base=base.substring(0, base.lastIndexOf("/")+1);

  const link=base+"view.html?data="+encoded;

  out.innerHTML=`
    <a href="${link}" target="_blank">open your phool 💌</a>
    <button onclick="copyLink('${link}')">copy link</button>
    <button onclick="shareWhatsApp('${link}')">share on whatsapp</button>
  `;
}

function copyLink(link){
  navigator.clipboard.writeText(link);
  alert("copied 💌");
}

function shareWhatsApp(link){
  const url = "https://wa.me/?text=" + encodeURIComponent("someone sent you this 💌 " + link);
  window.open(url, "_blank");
}
</script>

</body>
</html>
