<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>phool.</title>

<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Shadows+Into+Light&display=swap" rel="stylesheet">

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  background:#f6f1e8;
  font-family:'Patrick Hand', cursive;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
  position:relative;
}

/* paper */
.paper{
  width:90%;
  max-width:520px;
  padding:20px;
  background:#fffaf5;
  border:2px dashed #cfc7bd;
}

/* text */
.msg{
  margin:20px 0;
  font-size:17px;
  line-height:1.5;
}

/* typing */
.msg span{
  opacity:0;
  animation:write .3s forwards;
}
@keyframes write{
  to{opacity:1;}
}

/* 🌸 flowers */
.flower{
  position:absolute;
  font-size:18px;
  animation:float 6s linear infinite;
}
@keyframes float{
  from{transform:translateY(100vh)}
  to{transform:translateY(-10vh)}
}

/* 🐱 CAT */
.cat{
  position:absolute;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  font-size:34px;
  animation:bounce 2s ease-in-out infinite;
}

/* subtle bounce */
@keyframes bounce{
  0%,100%{transform:translateX(-50%) translateY(0);}
  50%{transform:translateX(-50%) translateY(-6px);}
}

/* actions */
.actions{
  position:absolute;
  top:10px;
  right:10px;
}

.actions button{
  padding:6px 10px;
  font-size:12px;
}

/* credit */
.credit{
  position:absolute;
  bottom:5px;
  font-size:11px;
}
</style>
</head>

<body>

<div id="capture" class="paper">
  <div id="to"></div>
  <div id="msg" class="msg"></div>
  <div id="from"></div>
</div>

<div class="actions">
  <button onclick="downloadImage()">📸</button>
</div>

<!-- 🐱 CAT -->
<div class="cat">🐱</div>

<div class="credit">built by someone for his someone.</div>

<!-- heartbeat -->
<audio id="beat" src="https://cdn.pixabay.com/audio/2022/03/15/audio_115b9b7c0b.mp3" loop></audio>

<script>
const params=new URLSearchParams(location.search);
const data=JSON.parse(atob(params.get("data")||""));

to.innerText="to: "+data.to;
from.innerText="from: "+data.from;

/* typing */
function write(text){
  msg.innerHTML="";
  let d=0;
  text.split("").forEach(c=>{
    const s=document.createElement("span");
    s.innerText=c;
    s.style.animationDelay=d+"s";
    msg.appendChild(s);
    d+=0.03;
  });
}
write(data.msg);

/* 🌸 flowers */
for(let i=0;i<15;i++){
  const f=document.createElement("div");
  f.className="flower";
  f.innerText="🌸";
  f.style.left=Math.random()*100+"vw";
  f.style.animationDuration=(4+Math.random()*3)+"s";
  document.body.appendChild(f);
}

/* sound */
setTimeout(()=>{
  document.getElementById("beat").play().catch(()=>{});
},800);

/* download */
function downloadImage(){
  html2canvas(document.getElementById("capture")).then(canvas=>{
    const link=document.createElement("a");
    link.download="phool.png";
    link.href=canvas.toDataURL();
    link.click();
  });
}
</script>

</body>
</html>
